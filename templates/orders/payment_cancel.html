{% extends 'base.html' %}
{% block title %}Payment Cancelled — Order #{{ order.pk }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto text-center py-8">

  <div class="bg-gray-50 border border-gray-200 rounded-2xl p-8 mb-6">
    <p class="text-xl font-bold text-gray-800 mb-2">Payment cancelled</p>
    <p class="text-gray-600">
      Your order <strong>#{{ order.pk }}</strong> has not been paid yet.
      You can complete payment whenever you're ready.
    </p>
  </div>

  <div class="flex gap-4 justify-center">
    <form method="post" action="{% url 'orders:initiate_payment' pk=order.pk %}">
      {% csrf_token %}
      <button type="submit"
              class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-xl transition-colors">
        Try Payment Again
      </button>
    </form>
    <a href="{% url 'catalog:home' %}"
       class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-3 rounded-xl transition-colors">
      Continue Shopping
    </a>
  </div>

</div>
{% endblock %}
