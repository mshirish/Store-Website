{% extends 'base.html' %}
{% block title %}Sign Out — Our Store{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 text-center">
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Sign out?</h1>
    <p class="text-gray-500 text-sm mb-6">You'll need to sign back in to place orders.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition-colors">
        Sign Out
      </button>
    </form>
    <p class="mt-4">
      <a href="{% url 'catalog:home' %}" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
    </p>
  </div>
</div>
{% endblock %}
