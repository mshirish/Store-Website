{% extends 'base.html' %}
{% block title %}Password Reset — Our Store{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 text-center">
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Password updated</h1>
    <p class="text-gray-600 mb-6">Your password has been reset. You can now sign in with your new password.</p>
    <a href="{% url 'account_login' %}"
       class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-xl transition-colors">
      Sign In
    </a>
  </div>
</div>
{% endblock %}
