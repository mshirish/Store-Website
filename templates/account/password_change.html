{% extends 'base.html' %}
{% block title %}Change Password — Our Store{% endblock %}

{% block extra_head %}
<style>
  .auth-form label { display:block; font-size:.875rem; font-weight:600; color:#4A3D30; margin-bottom:.25rem; }
  .auth-form input[type=password] {
    display:block; width:100%; border:1px solid #CFC0A8; border-radius:.5rem;
    padding:.5rem .75rem; font-size:.875rem; outline:none; }
  .auth-form input[type=password]:focus {
    border-color:#724330; box-shadow:0 0 0 2px rgba(114,67,48,.25); }
  .auth-form ul.errorlist { list-style:none; margin:.25rem 0 0; padding:0; }
  .auth-form ul.errorlist li { color:#dc2626; font-size:.75rem; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Change Password</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-4">
        {{ field.label_tag }}
        {{ field }}
        {{ field.errors }}
      </div>
      {% endfor %}
      <button type="submit"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl transition-colors mt-2">
        Update Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
